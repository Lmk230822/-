<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>拼图游戏 - 四连方数学冒险</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe2b5, #ffc89c, #b0defa);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .floating-bg div {
            position: absolute;
            font-size: 2.2rem;
            animation: floatAnim 9s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes floatAnim {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .game-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 250, 230, 0.94);
            border-radius: 70px 70px 80px 80px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2), inset 0 1px 6px #fffbe6;
            padding: 20px 28px 30px;
            backdrop-filter: blur(3px);
            width: 1380px;
            max-width: 96vw;
        }

        .home-screen {
            text-align: center;
            padding: 70px 25px;
            position: relative;
            min-height: 550px;
            background: radial-gradient(circle at 30% 20%, #fff3cf, #ffdbb5);
            border-radius: 65px;
            box-shadow: inset 0 0 35px #fff9e0, 0 20px 30px rgba(0,0,0,0.15);
        }
        .home-title {
            font-size: 5rem;
            font-weight: bold;
            color: #ff6b4a;
            text-shadow: 8px 8px 0 #ffc785, 14px 14px 25px rgba(0,0,0,0.2);
            letter-spacing: 8px;
            margin: 40px 0;
            transform: rotate(-2deg);
            animation: titleWobble 2s infinite;
        }
        @keyframes titleWobble {
            0%,100%{ transform: translateY(0) rotate(-2deg);}
            50%{ transform: translateY(-18px) rotate(-1deg);}
        }
        .enter-game {
            position: absolute;
            bottom: 55px;
            right: 70px;
            font-size: 2rem;
            font-weight: bold;
            background: #ffaa44;
            padding: 14px 36px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 7px 9px 0 #bb6b1a;
            transition: 0.05s linear;
        }
        .enter-game:active {
            transform: translate(5px, 5px);
            box-shadow: 2px 3px 0 #bb6b1a;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .level-title {
            font-size: 2rem;
            font-weight: bold;
            background: #ffae4a;
            padding: 6px 30px;
            border-radius: 60px;
            color: white;
            box-shadow: 0 5px 0 #b45f1a;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background: #f4a261;
            border: none;
            font-size: 1.1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #9c5a2c;
            transition: 0.05s linear;
        }
        .nav-btn:active { transform: translateY(2px); }
        .next-btn {
            background: #6fbf4c;
            border: none;
            font-size: 1.4rem;
            padding: 8px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #367c1e;
            transition: 0.07s linear;
        }
        .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #367c1e; }

        .play-area {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .left-panel {
            background: #fdf0db;
            border-radius: 48px;
            padding: 20px 12px;
            width: 320px;
            box-shadow: inset 0 0 0 3px white, 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .right-panel {
            background: #fff5e8;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 540px;
            position: relative;
        }
        .grid-canvas {
            background: #fef0da;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #ffdeae;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }
        .shape-slot {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 15px;
        }
        .collect-card {
            background: #fff9ef;
            border-radius: 28px;
            padding: 10px;
            width: 85px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: 0.1s;
            cursor: pointer;
        }
        .collect-card:hover { transform: scale(1.05); background: #fff2dd; }
        .collect-canvas { display: block; margin: 0 auto; background: #eeddbb; border-radius: 18px; }
        .collect-name { font-size: 0.85rem; font-weight: bold; margin-top: 8px; color: #aa6f3c; }

        .ctrl-btn {
            background: #ffe1ad;
            border: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.05s linear;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }
        .ctrl-btn:active { transform: translateY(2px); }
        .result-area {
            background: #ecdbaa;
            margin-top: 18px;
            padding: 10px;
            border-radius: 35px;
            font-weight: bold;
            text-align: center;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        input {
            font-size: 1.2rem;
            width: 80px;
            text-align: center;
            border-radius: 40px;
            border: 2px solid #f5b642;
            padding: 5px;
            font-family: inherit;
        }
        .shape-preview-card {
            background: #f7e8d0;
            border-radius: 36px;
            padding: 8px;
            margin: 8px auto;
            cursor: pointer;
            transition: 0.1s;
            display: inline-block;
            width: 95px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .shape-preview-card:active { transform: scale(0.98); }
        .selected-shape-card { border: 4px solid #ffc107; background: #fff3cf; transform: scale(1.02); }
        .drag-unit {
            width: 55px;
            height: 55px;
            background: #FDA172;
            border-radius: 18px;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.2);
            cursor: grab;
            transition: 0.05s;
        }
        .drag-unit:active { cursor: grabbing; }
        .square-container {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin: 18px 0;
            flex-wrap: wrap;
        }
        .undo-btn {
            background: #a5d6ff;
            color: #2c5a2e;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot"></div>
<div class="floating-bg" id="floatingBg"></div>

<script>
    // ======================= 形状定义 =======================
    const SHAPES_LIB = {
        square: { matrix: [[1,1],[1,1]], color: "#e34234", name: "田字形" },
        L: { matrix: [[1,0],[1,0],[1,1]], color: "#ffb6c1", name: "L型" },
        T: { matrix: [[1,1,1],[0,1,0]], color: "#ffdb58", name: "T字型" },
        Z: { matrix: [[1,1,0],[0,1,1]], color: "#8fbc8f", name: "Z字型" },
        line: { matrix: [[1,1,1,1]], color: "#b19cd9", name: "一字型" }
    };
    const SHAPE_KEYS = ['square', 'L', 'T', 'Z', 'line'];

    // 矩阵变换函数
    function rotateMatrix(mat) {
        const rows = mat.length, cols = mat[0].length;
        let newMat = Array(cols).fill().map(() => Array(rows).fill(0));
        for (let i = 0; i < rows; i++)
            for (let j = 0; j < cols; j++)
                newMat[j][rows-1-i] = mat[i][j];
        return newMat;
    }
    // 左右翻转 (水平镜像)
    function flipHorizontal(mat) {
        return mat.map(row => [...row].reverse());
    }
    // 上下翻转 (垂直镜像)
    function flipVertical(mat) {
        return [...mat].reverse();
    }

    function drawMiniShapeCanvas(matrix, color, canvas, size=44) {
        const ctx = canvas.getContext('2d');
        const rows = matrix.length, cols = matrix[0].length;
        const blockW = size / cols;
        const blockH = size / rows;
        canvas.width = size; canvas.height = size;
        ctx.clearRect(0, 0, size, size);
        ctx.fillStyle = "#f6edd9";
        ctx.fillRect(0, 0, size, size);
        for (let i=0; i<rows; i++) {
            for (let j=0; j<cols; j++) {
                if (matrix[i][j]) {
                    ctx.fillStyle = color;
                    ctx.fillRect(j*blockW, i*blockH, blockW-1, blockH-1);
                    ctx.strokeStyle = "#bc8f6b";
                    ctx.strokeRect(j*blockW, i*blockH, blockW-1, blockH-1);
                }
            }
        }
    }

    // 全局状态
    let currentLevel = 0;
    let gameState = {
        collectedShapes: new Set(),
        currentGridCells: [],
        firstGridSize: { w: 8, h: 8 },
        shapePool: null,
        level2Placed: [],
        level2Grid: null,
        level3Placed: [],
        level3Grid: null,
        level3Rows: 5, level3Cols: 5,
        selectedShapeKey: 'square',
        remainingSquares: 4,
        undoStack: []
    };

    function initShapePool() {
        let pool = {};
        for (let k of SHAPE_KEYS) {
            pool[k] = {
                key: k,
                matrix: SHAPES_LIB[k].matrix.map(row => [...row]),
                color: SHAPES_LIB[k].color,
                name: SHAPES_LIB[k].name
            };
        }
        gameState.shapePool = pool;
        gameState.selectedShapeKey = 'square';
    }

    function pushUndoState(levelSpecificState) {
        gameState.undoStack.push(JSON.parse(JSON.stringify(levelSpecificState)));
        if (gameState.undoStack.length > 30) gameState.undoStack.shift();
    }

    function popUndoState() {
        if (gameState.undoStack.length === 0) return null;
        return gameState.undoStack.pop();
    }

    // 识别第一关形状
    function recognizeShapeFromCells(cells) {
        if (cells.length !== 4) return null;
        let minX = Math.min(...cells.map(p=>p.x));
        let minY = Math.min(...cells.map(p=>p.y));
        let norm = cells.map(p=>({x:p.x-minX, y:p.y-minY}));
        let w = Math.max(...norm.map(p=>p.x))+1;
        let h = Math.max(...norm.map(p=>p.y))+1;
        let matrix = Array(h).fill().map(()=>Array(w).fill(0));
        norm.forEach(p=>{ matrix[p.y][p.x] = 1; });
        for(let key of SHAPE_KEYS) {
            let base = SHAPES_LIB[key].matrix;
            let variants = [base];
            let cur = base;
            for(let r=0; r<4; r++) { let rot=rotateMatrix(cur); if(!variants.some(v=>JSON.stringify(v)===JSON.stringify(rot))) variants.push(rot); cur=rot; }
            let flippedH = flipHorizontal(base);
            if(!variants.some(v=>JSON.stringify(v)===JSON.stringify(flippedH))) variants.push(flippedH);
            let flippedV = flipVertical(base);
            if(!variants.some(v=>JSON.stringify(v)===JSON.stringify(flippedV))) variants.push(flippedV);
            cur = flippedH;
            for(let r=0; r<4; r++) { let rot=rotateMatrix(cur); if(!variants.some(v=>JSON.stringify(v)===JSON.stringify(rot))) variants.push(rot); cur=rot; }
            cur = flippedV;
            for(let r=0; r<4; r++) { let rot=rotateMatrix(cur); if(!variants.some(v=>JSON.stringify(v)===JSON.stringify(rot))) variants.push(rot); cur=rot; }
            for(let variant of variants) {
                if(variant.length===matrix.length && variant[0].length===matrix[0].length) {
                    let match=true;
                    for(let i=0;i<matrix.length && match;i++)
                        for(let j=0;j<matrix[0].length;j++)
                            if(variant[i][j] !== matrix[i][j]) match=false;
                    if(match) return key;
                }
            }
        }
        return null;
    }

    // ======================= 第一关 =======================
    let level1Canvas, level1Ctx, cellSize=45;
    function renderLevel1() {
        gameState.currentGridCells = [];
        gameState.remainingSquares = 4;
        gameState.undoStack = [];
        if (!gameState.shapePool) initShapePool();
        const root = document.getElementById('gameRoot');
        root.innerHTML = `
            <div class="level-header">
                <div class="level-title">🧩 第一关 · 收集四连方 🧩</div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="backToHomeBtn">🏠 首页</button>
                    <button class="nav-btn" id="goToLevel2Btn">🎮 跳转第二关</button>
                    <button class="nav-btn" id="goToLevel3Btn">🚀 跳转第三关</button>
                </div>
                <button class="next-btn" id="nextLevelBtn">➡️ 下一关</button>
            </div>
            <div class="play-area">
                <div class="left-panel"><div style="font-size:1.4rem">✨ 拖拽小方块 ✨</div>
                <div id="squaresContainer" class="square-container"></div>
                <div class="control-buttons"><button id="clearGridBtn" class="ctrl-btn">🧹 清空格子</button><button id="confirmShapeBtn" class="ctrl-btn">✅ 确认形状</button><button id="undoBtn" class="ctrl-btn undo-btn">↩️ 撤回</button></div>
                <div><h3>📦 收集图样</h3><div id="collectPanel" class="shape-slot"></div></div></div>
                <div class="right-panel"><canvas id="level1GridCanvas" width="${gameState.firstGridSize.w*cellSize}" height="${gameState.firstGridSize.h*cellSize}" class="grid-canvas"></canvas><div class="result-area" id="messageArea">⭐ 拖拽4个方块到右侧，拼成四连方，点击确认收集！</div></div>
            </div>
        `;
        level1Canvas = document.getElementById('level1GridCanvas');
        level1Ctx = level1Canvas.getContext('2d');
        drawLevel1Grid();
        updateSquaresUI();
        updateCollectPanelUI();
        attachLevel1Events();
        document.getElementById('backToHomeBtn')?.addEventListener('click', () => { currentLevel = 0; renderHome(); });
        document.getElementById('goToLevel2Btn')?.addEventListener('click', () => { currentLevel = 2; renderLevel2(); });
        document.getElementById('goToLevel3Btn')?.addEventListener('click', () => { currentLevel = 3; renderLevel3(); });
        document.getElementById('nextLevelBtn')?.addEventListener('click', () => { currentLevel = 2; renderLevel2(); });
    }

    function updateSquaresUI() {
        const container = document.getElementById('squaresContainer');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < gameState.remainingSquares; i++) {
            const sq = document.createElement('div');
            sq.className = 'drag-unit';
            sq.setAttribute('draggable', 'true');
            sq.addEventListener('dragstart', handleSquareDragStart);
            container.appendChild(sq);
        }
        if (gameState.remainingSquares === 0) {
            const msg = document.createElement('div');
            msg.innerText = '✨ 四个方块已用完，确认形状后重置 ✨';
            msg.style.fontSize = '0.9rem';
            container.appendChild(msg);
        }
    }

    function handleSquareDragStart(e) {
        e.dataTransfer.setData('text/plain', 'square_unit');
        e.dataTransfer.effectAllowed = 'copy';
    }

    function drawLevel1Grid() {
        if(!level1Ctx) return;
        let w = gameState.firstGridSize.w, h = gameState.firstGridSize.h;
        level1Ctx.clearRect(0,0,level1Canvas.width,level1Canvas.height);
        for(let i=0;i<w;i++) for(let j=0;j<h;j++) {
            let occupied = gameState.currentGridCells.some(cell=>cell.x===i && cell.y===j);
            level1Ctx.fillStyle = occupied ? "#f5ad6e" : "#fff2df";
            level1Ctx.fillRect(i*cellSize, j*cellSize, cellSize-1, cellSize-1);
            level1Ctx.strokeStyle = "#8b6946";
            level1Ctx.lineWidth = 1.5;
            level1Ctx.strokeRect(i*cellSize, j*cellSize, cellSize-1, cellSize-1);
        }
    }

    function updateCollectPanelUI() {
        const panel = document.getElementById('collectPanel');
        if(!panel) return;
        panel.innerHTML = '';
        const collectedArr = Array.from(gameState.collectedShapes);
        if (collectedArr.length === 0) {
            panel.innerHTML = '<div style="padding:12px;">🎨 拼出形状后，这里会显示精美图样 🎨</div>';
        } else {
            for (let key of collectedArr) {
                const shape = SHAPES_LIB[key];
                const card = document.createElement('div');
                card.className = 'collect-card';
                const canvas = document.createElement('canvas');
                canvas.width = 56; canvas.height = 56;
                canvas.className = 'collect-canvas';
                drawMiniShapeCanvas(shape.matrix, shape.color, canvas, 56);
                const nameSpan = document.createElement('div');
                nameSpan.className = 'collect-name';
                nameSpan.innerText = '???';
                card.appendChild(canvas);
                card.appendChild(nameSpan);
                card.setAttribute('data-key', key);
                card.addEventListener('click', (e) => {
                    if (gameState.collectedShapes.size === 5) {
                        nameSpan.innerText = shape.name;
                        document.getElementById('messageArea').innerHTML = `🎉 ${shape.name} 解锁！`;
                    } else {
                        document.getElementById('messageArea').innerHTML = `⭐ 还差 ${5 - gameState.collectedShapes.size} 种，集齐后点击图样会显示名字~`;
                    }
                });
                panel.appendChild(card);
            }
        }
    }

    function undoLevel1() {
        if (gameState.undoStack.length === 0) {
            document.getElementById('messageArea').innerHTML = '⚠️ 没有可以撤回的操作了';
            return;
        }
        let last = popUndoState();
        gameState.currentGridCells = last.cells;
        gameState.remainingSquares = last.remaining;
        drawLevel1Grid();
        updateSquaresUI();
        document.getElementById('messageArea').innerHTML = '↩️ 已撤回上一步操作';
    }

    function attachLevel1Events() {
        level1Canvas.addEventListener('dragover', (e) => e.preventDefault());
        level1Canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const dragType = e.dataTransfer.getData('text/plain');
            if (dragType !== 'square_unit') return;
            if (gameState.remainingSquares === 0) {
                document.getElementById('messageArea').innerHTML = '⚠️ 已经没有小方块了，请确认形状或清空重置！';
                return;
            }
            if (gameState.currentGridCells.length >= 4) {
                document.getElementById('messageArea').innerHTML = '⚠️ 已经放置了4个方块，请先确认形状或清空！';
                return;
            }
            const rect = level1Canvas.getBoundingClientRect();
            const scaleX = level1Canvas.width/rect.width;
            const scaleY = level1Canvas.height/rect.height;
            let mouseX = (e.clientX - rect.left)*scaleX;
            let mouseY = (e.clientY - rect.top)*scaleY;
            let col = Math.floor(mouseX / cellSize);
            let row = Math.floor(mouseY / cellSize);
            if(col>=0 && col<gameState.firstGridSize.w && row>=0 && row<gameState.firstGridSize.h) {
                if(!gameState.currentGridCells.some(c=>c.x===col && c.y===row)) {
                    pushUndoState({ cells: JSON.parse(JSON.stringify(gameState.currentGridCells)), remaining: gameState.remainingSquares });
                    gameState.currentGridCells.push({x:col, y:row});
                    gameState.remainingSquares--;
                    drawLevel1Grid();
                    updateSquaresUI();
                    document.getElementById('messageArea').innerHTML = `✅ 放置成功！还剩 ${gameState.remainingSquares} 个方块。`;
                } else {
                    document.getElementById('messageArea').innerHTML = '❌ 格子已有方块';
                }
            }
        });

        document.getElementById('clearGridBtn')?.addEventListener('click', ()=>{
            pushUndoState({ cells: JSON.parse(JSON.stringify(gameState.currentGridCells)), remaining: gameState.remainingSquares });
            gameState.currentGridCells = [];
            gameState.remainingSquares = 4;
            drawLevel1Grid();
            updateSquaresUI();
            document.getElementById('messageArea').innerHTML = '✨ 格子已清空，所有小方块已重置。';
        });
        document.getElementById('confirmShapeBtn')?.addEventListener('click', ()=>{
            if(gameState.currentGridCells.length !== 4) { alert('需要恰好4个方块组成四连方'); return; }
            let shapeKey = recognizeShapeFromCells(gameState.currentGridCells);
            if(shapeKey && SHAPE_KEYS.includes(shapeKey)) {
                if(!gameState.collectedShapes.has(shapeKey)) {
                    gameState.collectedShapes.add(shapeKey);
                    document.getElementById('messageArea').innerHTML = `🎉 获得 ${SHAPES_LIB[shapeKey].name} ！继续收集其他形状～`;
                    pushUndoState({ cells: JSON.parse(JSON.stringify(gameState.currentGridCells)), remaining: gameState.remainingSquares });
                    gameState.currentGridCells = [];
                    gameState.remainingSquares = 4;
                    drawLevel1Grid();
                    updateSquaresUI();
                    updateCollectPanelUI();
                } else {
                    document.getElementById('messageArea').innerHTML = `⚠️ 已经收集过 ${SHAPES_LIB[shapeKey].name} 啦，试试其他形状！`;
                }
            } else {
                document.getElementById('messageArea').innerHTML = '❌ 无法识别四连方（需要田/L/T/Z/一字型）';
            }
        });
        document.getElementById('undoBtn')?.addEventListener('click', undoLevel1);
    }

    // ======================= 第二、三关：优化放置逻辑 =======================
    let level2Canvas, level2Ctx;
    let level3Canvas, level3Ctx;
    let isDraggingPlaced = false;
    let draggedPlacedIndex = -1;
    let dragPlacedLevel = null;
    let previewActive = false;
    let previewRow = -1, previewCol = -1;
    let previewValid = false;
    let rafId = null;
    let lastMouseX = -1, lastMouseY = -1;

    function drawLevelGrid(level, showPreview = true) {
        if (level === 2) {
            if(!level2Ctx) return;
            let rows=5, cols=4;
            level2Ctx.clearRect(0, 0, level2Canvas.width, level2Canvas.height);
            for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) {
                let fill = gameState.level2Grid[i][j] ? "#cde4c1" : "#faf0dc";
                level2Ctx.fillStyle = fill;
                level2Ctx.fillRect(j*50, i*50, 49, 49);
                level2Ctx.strokeStyle = "#8b6946";
                level2Ctx.lineWidth = 1.5;
                level2Ctx.strokeRect(j*50, i*50, 49, 49);
            }
            for(let p of gameState.level2Placed) {
                drawShapeOnGrid(p.matrix, p.x, p.y, p.color, level2Ctx, 50);
            }
            if (showPreview && previewActive && previewRow >= 0 && previewCol >= 0 && gameState.selectedShapeKey) {
                let shape = gameState.shapePool[gameState.selectedShapeKey];
                if (shape) {
                    level2Ctx.globalAlpha = 0.6;
                    let color = previewValid ? "#00cc66" : "#ff6666";
                    drawShapeOnGrid(shape.matrix, previewRow, previewCol, color, level2Ctx, 50);
                    level2Ctx.globalAlpha = 1.0;
                }
            }
        } else if (level === 3) {
            if(!level3Ctx) return;
            let rows = gameState.level3Rows, cols = gameState.level3Cols;
            level3Ctx.clearRect(0,0,cols*50,rows*50);
            for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) {
                let fill = gameState.level3Grid[i][j] ? "#d6edc6" : "#fff3e0";
                level3Ctx.fillStyle = fill;
                level3Ctx.fillRect(j*50, i*50, 49, 49);
                level3Ctx.strokeStyle = "#8b6946";
                level3Ctx.lineWidth = 1.5;
                level3Ctx.strokeRect(j*50, i*50, 49, 49);
            }
            for(let p of gameState.level3Placed) {
                drawShapeOnGrid(p.matrix, p.x, p.y, p.color, level3Ctx, 50);
            }
            if (showPreview && previewActive && previewRow >= 0 && previewCol >= 0 && gameState.selectedShapeKey) {
                let shape = gameState.shapePool[gameState.selectedShapeKey];
                if (shape) {
                    level3Ctx.globalAlpha = 0.6;
                    let color = previewValid ? "#00cc66" : "#ff6666";
                    drawShapeOnGrid(shape.matrix, previewRow, previewCol, color, level3Ctx, 50);
                    level3Ctx.globalAlpha = 1.0;
                }
            }
        }
    }

    function drawShapeOnGrid(mat, startX, startY, color, ctx, cs) {
        ctx.fillStyle = color;
        for(let i=0;i<mat.length;i++)
            for(let j=0;j<mat[0].length;j++)
                if(mat[i][j]) ctx.fillRect((startY+j)*cs, (startX+i)*cs, cs-1, cs-1);
    }

    function undoLevel23(level) {
        if (gameState.undoStack.length === 0) {
            document.getElementById('messageArea').innerHTML = '⚠️ 没有可以撤回的操作了';
            return;
        }
        let last = popUndoState();
        if (level === 2) {
            gameState.level2Placed = last.placed;
            gameState.level2Grid = last.grid;
        } else {
            gameState.level3Placed = last.placed;
            gameState.level3Grid = last.grid;
            gameState.level3Rows = last.rows;
            gameState.level3Cols = last.cols;
            if (level3Canvas) {
                level3Canvas.width = gameState.level3Cols * 50;
                level3Canvas.height = gameState.level3Rows * 50;
            }
        }
        drawLevelGrid(level);
        document.getElementById('messageArea').innerHTML = '↩️ 已撤回上一步操作';
    }

    function checkPlacementValid(level, shapeMatrix, row, col) {
        let rowsM = shapeMatrix.length, colsM = shapeMatrix[0].length;
        let grid = level === 2 ? gameState.level2Grid : gameState.level3Grid;
        let maxRow = level === 2 ? 5 : gameState.level3Rows;
        let maxCol = level === 2 ? 4 : gameState.level3Cols;
        if (row + rowsM > maxRow || col + colsM > maxCol) return false;
        for(let i=0;i<rowsM;i++)
            for(let j=0;j<colsM;j++)
                if(shapeMatrix[i][j] && grid[row+i][col+j]) return false;
        return true;
    }

    function tryPlaceNewShapeAt(level, shapeKey, matrix, color, gridRow, gridCol) {
        if (!checkPlacementValid(level, matrix, gridRow, gridCol)) return false;
        let snapshot = level === 2 ? 
            { placed: JSON.parse(JSON.stringify(gameState.level2Placed)), grid: JSON.parse(JSON.stringify(gameState.level2Grid)) } :
            { placed: JSON.parse(JSON.stringify(gameState.level3Placed)), grid: JSON.parse(JSON.stringify(gameState.level3Grid)), rows: gameState.level3Rows, cols: gameState.level3Cols };
        pushUndoState(snapshot);
        let newPlace = { shapeId: shapeKey, matrix: matrix.map(r=>[...r]), x: gridRow, y: gridCol, color: color };
        if (level === 2) gameState.level2Placed.push(newPlace);
        else gameState.level3Placed.push(newPlace);
        let grid = level === 2 ? gameState.level2Grid : gameState.level3Grid;
        for(let i=0;i<matrix.length;i++)
            for(let j=0;j<matrix[0].length;j++)
                if(matrix[i][j]) grid[gridRow+i][gridCol+j] = 1;
        drawLevelGrid(level);
        return true;
    }

    function movePlacedShapeTo(level, index, newRow, newCol) {
        let placed = level === 2 ? gameState.level2Placed : gameState.level3Placed;
        if (index < 0 || index >= placed.length) return false;
        let shape = placed[index];
        let matrix = shape.matrix;
        if (!checkPlacementValid(level, matrix, newRow, newCol)) return false;
        let snapshot = level === 2 ? 
            { placed: JSON.parse(JSON.stringify(gameState.level2Placed)), grid: JSON.parse(JSON.stringify(gameState.level2Grid)) } :
            { placed: JSON.parse(JSON.stringify(gameState.level3Placed)), grid: JSON.parse(JSON.stringify(gameState.level3Grid)), rows: gameState.level3Rows, cols: gameState.level3Cols };
        pushUndoState(snapshot);
        let grid = level === 2 ? gameState.level2Grid : gameState.level3Grid;
        for(let i=0;i<matrix.length;i++)
            for(let j=0;j<matrix[0].length;j++)
                if(matrix[i][j]) grid[shape.x+i][shape.y+j] = 0;
        shape.x = newRow;
        shape.y = newCol;
        for(let i=0;i<matrix.length;i++)
            for(let j=0;j<matrix[0].length;j++)
                if(matrix[i][j]) grid[newRow+i][newCol+j] = 1;
        drawLevelGrid(level);
        return true;
    }

    function startDragPlaced(level, index, mouseX, mouseY) {
        isDraggingPlaced = true;
        draggedPlacedIndex = index;
        dragPlacedLevel = level;
        document.body.style.cursor = 'grabbing';
    }

    let pendingPreviewUpdate = false;
    function schedulePreviewUpdate(level, mouseX, mouseY) {
        if (pendingPreviewUpdate) return;
        pendingPreviewUpdate = true;
        requestAnimationFrame(() => {
            updatePreview(level, mouseX, mouseY);
            pendingPreviewUpdate = false;
        });
    }

    function updatePreview(level, mouseX, mouseY) {
        let canvas = level === 2 ? level2Canvas : level3Canvas;
        if (!canvas || !gameState.selectedShapeKey) return;
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let canvasMouseX = (mouseX - rect.left) * scaleX;
        let canvasMouseY = (mouseY - rect.top) * scaleY;
        let col = Math.floor(canvasMouseX / 50);
        let row = Math.floor(canvasMouseY / 50);
        let shape = gameState.shapePool[gameState.selectedShapeKey];
        if (shape && row >= 0 && col >= 0) {
            previewActive = true;
            previewRow = row;
            previewCol = col;
            previewValid = checkPlacementValid(level, shape.matrix, row, col);
            drawLevelGrid(level, true);
        } else {
            if (previewActive) {
                previewActive = false;
                drawLevelGrid(level, false);
            }
        }
    }

    function onMouseMove(e) {
        if (isDraggingPlaced) {
            e.preventDefault();
            let canvas = dragPlacedLevel === 2 ? level2Canvas : level3Canvas;
            if (!canvas) return;
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let canvasMouseX = (e.clientX - rect.left) * scaleX;
            let canvasMouseY = (e.clientY - rect.top) * scaleY;
            let targetCol = Math.floor(canvasMouseX / 50);
            let targetRow = Math.floor(canvasMouseY / 50);
            if (targetRow >= 0 && targetCol >= 0) {
                let placed = dragPlacedLevel === 2 ? gameState.level2Placed : gameState.level3Placed;
                let shape = placed[draggedPlacedIndex];
                let matrix = shape.matrix;
                let maxRow = dragPlacedLevel === 2 ? 5 : gameState.level3Rows;
                let maxCol = dragPlacedLevel === 2 ? 4 : gameState.level3Cols;
                if (targetRow + matrix.length <= maxRow && targetCol + matrix[0].length <= maxCol) {
                    drawLevelGrid(dragPlacedLevel, false);
                    let ctx = dragPlacedLevel === 2 ? level2Ctx : level3Ctx;
                    ctx.globalAlpha = 0.6;
                    drawShapeOnGrid(matrix, targetRow, targetCol, shape.color, ctx, 50);
                    ctx.globalAlpha = 1.0;
                }
            }
            return;
        }
        if (!lastMouseX || Math.abs(e.clientX - lastMouseX) > 2 || Math.abs(e.clientY - lastMouseY) > 2) {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            schedulePreviewUpdate(currentLevel, e.clientX, e.clientY);
        }
    }

    function onMouseUp(e) {
        // 处理移动已放置拼块
        if (isDraggingPlaced) {
            isDraggingPlaced = false;
            document.body.style.cursor = 'default';
            let canvas = dragPlacedLevel === 2 ? level2Canvas : level3Canvas;
            if (!canvas) return;
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let canvasMouseX = (e.clientX - rect.left) * scaleX;
            let canvasMouseY = (e.clientY - rect.top) * scaleY;
            let targetCol = Math.floor(canvasMouseX / 50);
            let targetRow = Math.floor(canvasMouseY / 50);
            if (targetRow >= 0 && targetCol >= 0) {
                let success = movePlacedShapeTo(dragPlacedLevel, draggedPlacedIndex, targetRow, targetCol);
                if (!success) {
                    document.getElementById('messageArea').innerHTML = '❌ 移动失败，超出边界或重叠';
                } else {
                    document.getElementById('messageArea').innerHTML = '✅ 移动成功';
                }
            }
            drawLevelGrid(dragPlacedLevel);
            draggedPlacedIndex = -1;
            dragPlacedLevel = null;
            return;
        }

        // 放置新形状：直接从鼠标坐标计算并尝试放置
        let canvas = currentLevel === 2 ? level2Canvas : level3Canvas;
        if (!canvas || !gameState.selectedShapeKey) return;
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        let col = Math.floor(mouseX / 50);
        let row = Math.floor(mouseY / 50);
        if (row >= 0 && col >= 0) {
            let shape = gameState.shapePool[gameState.selectedShapeKey];
            if (shape) {
                let valid = checkPlacementValid(currentLevel, shape.matrix, row, col);
                if (valid) {
                    let success = tryPlaceNewShapeAt(currentLevel, gameState.selectedShapeKey, shape.matrix, shape.color, row, col);
                    if (success) {
                        document.getElementById('messageArea').innerHTML = `✅ 放置 ${shape.name} 成功！`;
                    } else {
                        document.getElementById('messageArea').innerHTML = `❌ 放置失败`;
                    }
                } else {
                    document.getElementById('messageArea').innerHTML = `❌ 无法放置，超出边界或重叠`;
                }
            }
        }
        // 清除预览状态
        previewActive = false;
        drawLevelGrid(currentLevel, false);
    }

    function bindCanvasEvents(level) {
        let canvas = level === 2 ? level2Canvas : level3Canvas;
        if (!canvas) return;
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseleave', () => {
            previewActive = false;
            drawLevelGrid(level, false);
        });
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('mousedown', (e) => {
            if (isDraggingPlaced) return;
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let col = Math.floor(mouseX / 50);
            let row = Math.floor(mouseY / 50);
            let placed = level === 2 ? gameState.level2Placed : gameState.level3Placed;
            for (let idx = 0; idx < placed.length; idx++) {
                let p = placed[idx];
                let mat = p.matrix;
                let rowsM = mat.length, colsM = mat[0].length;
                if (row >= p.x && row < p.x + rowsM && col >= p.y && col < p.y + colsM) {
                    if (mat[row - p.x][col - p.y]) {
                        startDragPlaced(level, idx, e.clientX, e.clientY);
                        e.preventDefault();
                        break;
                    }
                }
            }
        });
    }

    // 通用的翻转处理函数
    function applyTransform(level, transformFn) {
        let key = gameState.selectedShapeKey;
        if (key && gameState.shapePool[key]) {
            let newMat = transformFn(gameState.shapePool[key].matrix);
            gameState.shapePool[key].matrix = newMat;
            updateShapesPanel(level);
            drawLevelGrid(level, previewActive);
            if (previewActive && previewRow >= 0 && previewCol >= 0) {
                previewValid = checkPlacementValid(level, newMat, previewRow, previewCol);
                drawLevelGrid(level, true);
            }
        }
    }

    function updateShapesPanel(level) {
        const container = document.getElementById('shapesContainer');
        if(!container) return;
        container.innerHTML = '';
        for(let key of SHAPE_KEYS) {
            let shape = gameState.shapePool[key];
            let card = document.createElement('div');
            card.className = `shape-preview-card ${gameState.selectedShapeKey===key ? 'selected-shape-card' : ''}`;
            let canvas = document.createElement('canvas');
            canvas.width = 70; canvas.height = 70;
            drawMiniShapeCanvas(shape.matrix, shape.color, canvas, 70);
            let label = document.createElement('div');
            label.innerText = shape.name;
            label.style.fontSize = '0.8rem';
            card.appendChild(canvas);
            card.appendChild(label);
            card.setAttribute('data-shapekey', key);
            card.addEventListener('click', (e) => {
                gameState.selectedShapeKey = key;
                updateShapesPanel(level);
                document.getElementById('messageArea').innerHTML = `✨ 已选中 ${shape.name}，移动鼠标到网格预览，点击放置 ✨`;
            });
            container.appendChild(card);
        }
        // 按钮事件绑定
        const rotateBtn = document.getElementById('rotateBtn');
        const flipHBtn = document.getElementById('flipHBtn');
        const flipVBtn = document.getElementById('flipVBtn');
        const resetBtn = document.getElementById('resetPlacedBtn');
        const undoBtn = document.getElementById('undoBtnLevel');
        const confirmBtn = document.getElementById('confirmPuzzleBtn');
        
        if (rotateBtn) rotateBtn.onclick = () => applyTransform(level, rotateMatrix);
        if (flipHBtn) flipHBtn.onclick = () => applyTransform(level, flipHorizontal);
        if (flipVBtn) flipVBtn.onclick = () => applyTransform(level, flipVertical);
        if (resetBtn) {
            resetBtn.onclick = () => {
                let snapshot = level === 2 ? 
                    { placed: JSON.parse(JSON.stringify(gameState.level2Placed)), grid: JSON.parse(JSON.stringify(gameState.level2Grid)) } :
                    { placed: JSON.parse(JSON.stringify(gameState.level3Placed)), grid: JSON.parse(JSON.stringify(gameState.level3Grid)), rows: gameState.level3Rows, cols: gameState.level3Cols };
                pushUndoState(snapshot);
                if(level===2){
                    gameState.level2Placed = [];
                    gameState.level2Grid = Array(5).fill().map(()=>Array(4).fill(0));
                    drawLevelGrid(2);
                } else {
                    gameState.level3Placed = [];
                    gameState.level3Grid = Array(gameState.level3Rows).fill().map(()=>Array(gameState.level3Cols).fill(0));
                    drawLevelGrid(3);
                }
                document.getElementById('messageArea').innerHTML = '🗑️ 已重置拼图，可以重新尝试！';
            };
        }
        if (undoBtn) undoBtn.onclick = () => undoLevel23(level);
        if (confirmBtn) {
            confirmBtn.onclick = () => {
                let full = level===2 ? checkFullFill(2) : checkFullFill(3);
                if(full) {
                    let msg = `🎉 完美拼图！${level===2 ? '5x4长方形完成' : `创意${gameState.level3Cols}x${gameState.level3Rows}完成`}`;
                    document.getElementById('confirmResultArea').innerHTML = `✅ 确认记录：${msg}`;
                } else {
                    alert("还没有完全填满，继续尝试吧！可旋转/翻转形状，或点击已放置拼块拖拽移动。");
                }
            };
        }
    }

    function checkFullFill(level) {
        let grid = level===2 ? gameState.level2Grid : gameState.level3Grid;
        let rows = level===2 ? 5 : gameState.level3Rows;
        let cols = level===2 ? 4 : gameState.level3Cols;
        for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) if(grid[i][j]===0) return false;
        return true;
    }

    function renderLevel2() {
        if (!gameState.shapePool) initShapePool();
        gameState.level2Placed = [];
        gameState.level2Grid = Array(5).fill().map(()=>Array(4).fill(0));
        gameState.undoStack = [];
        currentLevel = 2;
        const root = document.getElementById('gameRoot');
        root.innerHTML = getLevel23HTML('🎨 第二关 · 填充5x4长方形', 5, 4, false);
        level2Canvas = document.getElementById('levelGridCanvas');
        level2Ctx = level2Canvas.getContext('2d');
        drawLevelGrid(2);
        updateShapesPanel(2);
        bindCanvasEvents(2);
        document.getElementById('backToHomeBtn')?.addEventListener('click', () => { currentLevel = 0; renderHome(); });
        document.getElementById('backToLevel1Btn')?.addEventListener('click', () => { currentLevel = 1; renderLevel1(); });
        document.getElementById('goToLevel3Btn')?.addEventListener('click', () => { currentLevel = 3; renderLevel3(); });
        document.getElementById('nextLevelBtn').onclick = () => { currentLevel = 3; renderLevel3(); };
    }

    function renderLevel3() {
        if (!gameState.shapePool) initShapePool();
        gameState.level3Rows = 5; gameState.level3Cols = 5;
        gameState.level3Placed = [];
        gameState.level3Grid = Array(5).fill().map(()=>Array(5).fill(0));
        gameState.undoStack = [];
        currentLevel = 3;
        const root = document.getElementById('gameRoot');
        root.innerHTML = getLevel23HTML('🌈 第三关 · 创意拼摆 (自由尺寸) 🌈', 5, 5, true);
        level3Canvas = document.getElementById('levelGridCanvas');
        level3Ctx = level3Canvas.getContext('2d');
        drawLevelGrid(3);
        updateShapesPanel(3);
        bindCanvasEvents(3);
        document.getElementById('backToHomeBtn')?.addEventListener('click', () => { currentLevel = 0; renderHome(); });
        document.getElementById('backToLevel2Btn')?.addEventListener('click', () => { currentLevel = 2; renderLevel2(); });
        document.getElementById('nextLevelBtn').innerText = '🏆 通关庆典 🏆';
        document.getElementById('nextLevelBtn').onclick = () => { alert("🎉 恭喜你完成全部挑战！数学拼图大师！ 🎉"); };
        document.getElementById('customDimBtn')?.addEventListener('click',()=>{
            let w = parseInt(document.getElementById('widthInput').value);
            let h = parseInt(document.getElementById('heightInput').value);
            if (isNaN(w) || isNaN(h) || w < 1 || h < 1) {
                alert("请输入有效的宽度和高度（正整数）");
                return;
            }
            let snapshot = { placed: JSON.parse(JSON.stringify(gameState.level3Placed)), grid: JSON.parse(JSON.stringify(gameState.level3Grid)), rows: gameState.level3Rows, cols: gameState.level3Cols };
            pushUndoState(snapshot);
            gameState.level3Rows = h; gameState.level3Cols = w;
            gameState.level3Grid = Array(h).fill().map(()=>Array(w).fill(0));
            gameState.level3Placed = [];
            let canvas = document.getElementById('levelGridCanvas');
            canvas.width = w*50; canvas.height = h*50;
            drawLevelGrid(3);
            document.getElementById('messageArea').innerHTML = `🎨 新画布 ${w}x${h} 请继续创意拼摆！`;
            updateShapesPanel(3);
            bindCanvasEvents(3);
        });
    }

    function getLevel23HTML(title, rows, cols, custom) {
        let wCanvas = cols*50, hCanvas = rows*50;
        let customHtml = custom ? `<div class="flex-row">📐 自定义宽: <input id="widthInput" type="number" value="${cols}" min="1" max="20"> 高: <input id="heightInput" type="number" value="${rows}" min="1" max="20"><button id="customDimBtn" class="ctrl-btn">生成新网格</button><span class="warning">(自由创意，面积无限制)</span></div>` : '';
        return `
            <div class="level-header">
                <div class="level-title">${title}</div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="backToHomeBtn">🏠 首页</button>
                    <button class="nav-btn" id="backToLevel1Btn">⬅️ 返回第一关</button>
                    ${!custom ? '<button class="nav-btn" id="goToLevel3Btn">🚀 跳转第三关</button>' : '<button class="nav-btn" id="backToLevel2Btn">⬅️ 返回第二关</button>'}
                </div>
                <button class="next-btn" id="nextLevelBtn">➡️ 下一关</button>
            </div>
            <div class="play-area">
                <div class="left-panel"><div style="font-size:1.3rem">🧩 点击形状选中，移动鼠标预览，点击放置 🧩</div>
                <div id="shapesContainer" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:15px 0;"></div>
                <div class="button-group">
                    <button id="rotateBtn" class="ctrl-btn">🔄 旋转</button>
                    <button id="flipHBtn" class="ctrl-btn">↔️ 左右翻转</button>
                    <button id="flipVBtn" class="ctrl-btn">↕️ 上下翻转</button>
                    <button id="resetPlacedBtn" class="ctrl-btn">🗑️ 重置拼图</button>
                    <button id="undoBtnLevel" class="ctrl-btn undo-btn">↩️ 撤回</button>
                    <button id="confirmPuzzleBtn" class="ctrl-btn">✅ 确认拼图</button>
                </div>
                <div id="infoMsg" style="font-size:0.9rem;">✨ 先点击左侧形状，移动鼠标到网格上会显示半透明预览（绿色可放/红色不可放），点击放置；已放置拼块可按住拖拽移动 ✨</div></div>
                <div class="right-panel"><canvas id="levelGridCanvas" width="${wCanvas}" height="${hCanvas}" class="grid-canvas"></canvas>${customHtml}<div class="result-area" id="messageArea">💡 移动鼠标预览形状位置，绿色表示可放置，点击即可放置；已放置拼块可拖拽移动。支持上下/左右翻转和旋转。</div><div class="result-area" id="confirmResultArea">✨ 拼图确认记录区 ✨</div></div>
            </div>
        `;
    }

    // 首页与背景
    function createFloatingBg() {
        const container = document.getElementById('floatingBg');
        const icons = ['🌟', '⭐', '🍎', '🐻', '🐼', '🌈', '🍭', '🎈', '🧸', '🐰'];
        for(let i=0; i<28; i++) {
            let el = document.createElement('div');
            el.innerText = icons[i % icons.length];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.fontSize = (20 + Math.random() * 40) + 'px';
            el.style.animationDuration = (6 + Math.random() * 8) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(el);
        }
    }

    function renderHome() {
        const root = document.getElementById('gameRoot');
        root.innerHTML = `
            <div class="home-screen">
                <div class="home-title">拼图游戏</div>
                <div class="enter-game" id="enterGameBtn">✨ 进入游戏 ✨</div>
            </div>
        `;
        document.getElementById('enterGameBtn').addEventListener('click', ()=>{
            currentLevel = 1;
            renderLevel1();
        });
        createFloatingBg();
    }

    renderHome();
</script>
